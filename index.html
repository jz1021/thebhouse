<style>
*{margin:0;padding:0;box-sizing:border-box}

<body>

<script>
// GAME STATE
var G={id:'',day:1,aff:{},affH:{},turn:{},exTo:{},meTo:{},_cb:null};
var S_=document.getElementById('screen'),AO=document.getElementById('affOverlay'),AP=document.getElementById('affPopup');

function V(h){S_.innerHTML='<div class="view">'+h+'</div>';}
function Q(id){return document.getElementById(id);}
function Mn(id){return DATA[G.id].ms.find(function(m){return m.id===id;});}
function AL(v){return v>=70?'❤️❤️❤️':v>=50?'❤️❤️':v>=30?'❤️':'🤍';}

var DATA={
fa:{p:{n:'你',a:26},x:{n:'李柱延',id:'jy',a:30,e:'✈️'},ms:[{id:'jy',n:'李柱延',a:30,e:'✈️',x:1},{id:'hj',n:'李贤在',a:27,e:'🩺',x:0},{id:'jb',n:'裴俊英',a:28,e:'📷',x:0},{id:'er',n:'孙英宰',a:23,e:'🏀',x:0}],fD:'<b>姜宥真</b>：外向主动，大大咧咧实则敏感，很会撒娇。笑的时候右手会攥紧杯柄。<br><br><b>徐敏荷</b>：冷静理性，话不多，气场强。不主动但很有存在感，不笑的时候像杂志模特。<br><br><b>朴瑞妍</b>：温柔文艺，说话轻声细语，容易让人有保护欲。及腰黑长直，皮肤白得几乎透明。',mt:'你们在培训上认识。他是试飞学员，你是实习乘务员。模拟舱那天，他坐你斜对面，看到你紧张到发抖，悄悄给你递来一只水。',bu:'分手是你提的。五年了，他从来不表达爱你，而他身边又有太多莺莺燕燕。聚少离多让你们的争吵越来越多，你累了。也许还是爱的，但爱他让你太累了。',ph:'THE_B_HOUSE_assets/8b511c18gy1h8vgemc76sj20xc0xcajc.jpg',lp:'我的X是一个很慢热的人\n偶尔也会冷不丁地吐槽\n\nX走路慢慢的\n说话慢慢的\n\nX玩狼人杀的时候总是傻傻相信别人的话\n并不是X不够聪明\n而是因为X是善良的人\n\nX从来不对我说谎\n即使很受欢迎\n也从来不会把这当回事\n\nX很会关心别人\n但是不喜欢邀功\n\nX的幽默不难懂\n只是需要点耐心\n\nX情绪不好的时候不会说话\n只要抱抱他就好了\n\n如果X在这里遇到谁\n希望那个人能看懂X的顺手\n也能理解他的安静',le:'X总说我记不住事\n但关于X的事\n我常常会突然想起来\n然后愣住\n\nX第一次来我家\n带了一盆薄荷\n\nX有些怕生\n给人的第一印象就像薄荷一样冰凉\n但熟悉X的人会知道\nX其实像夏天的冰块一样让人舒心\n\nX很有主见\n是那种会让人放心的人\n但在恋人面前的X\n也会像小孩子一样撒娇\n\n和X在一起\n每天都能看到不一样可爱的她\n是男朋友的幸运\n\nX不太笑\n但笑起来左边先翘\n她自己不知道\n\nX喜欢热的东西\n热汤，热咖啡\n还有活泼的、热烈的心\nX值得世界上最好、最温暖的一切'},
ch:{p:{n:'李贞',a:24},x:{n:'裴俊英(Jacob)',id:'jb',a:27,e:'💼'},ms:[{id:'jb',n:'裴俊英(Jacob)',a:27,e:'💼',x:1},{id:'hj',n:'李贤在',a:26,e:'🪖',x:0},{id:'yh',n:'金泳勋',a:28,e:'🌐',x:0},{id:'er',n:'孙英宰(Eric)',a:25,e:'⚽',x:0}],fD:'<b>女A·律师</b>：成熟型。气场强，不卑不亢，递东西的动作像递名片。<br><br><b>女B·编剧</b>：温柔型。声音软软的，会帮人摆盘子，容易被靠近。<br><br><b>女C·外科医生</b>：成熟型。话不多但每句都精准，习惯把手机扣在床头柜上。',mt:'他是你朋友的哥哥。第一次见面在朋友家客厅——他加班回来，手里提着便利店袋子。你坐在沙发上看比赛回放，他路过时看了一眼屏幕，说“你跳得很好看。”那是第一次有人不问你“为什么做这个”，只是说你好看。',bu:'分手是他提的。他希望你能找一份“稳定”的工作——不是不喜欢，是担心你受伤，担心你练到深夜没人接。你说他不理解你，他说你太回避。最后一次吵架，他问你“你到底想要什么”，你沉默了。他说分手吧，你说了好，快得不像话。十个月后你才知道——那天晚上，他在车里坐了四个小时。',ph:'THE_B_HOUSE_assets/SaveClip.App_564259307_17974045274954379_9160089034478819477_n.jpg',lp:'Jacob是我见过最聪明的男人\n也是最贴心的男人\n\nX是我朋友的哥哥\n从小是优等生的X\n尽管工作很忙\n也注重家庭与身边的人\n\n出去吃饭\nX会记得身边的人忌口\n朋友的生日\nX也会准备好礼物提前送去\n\nX的父母也很亲切\n也许正是这样温暖的家庭\n才会培养出X一样天使般善良的人\n\n作为恋人的X 还要更加美好\n是在X的照料下\n我学会变成一个靠谱、不冷漠的人\n\n任何人靠近X\n都会明白我所说一切\n\n我真心希望X能够幸福\n比任何人都幸福',le:'我所认识的X\n既有孩童的天真烂漫\n也有作为女人的成熟与美好\n\nX对恋人非常坦率\n脱口而出的话语能让我幸福很久\n\nX是一个非常会表达爱的人\n\nX很受欢迎\n我周围所有的男生都认识X\n但X从来不会让我感觉不安全\n\nX是善良又有边界的人\n\n能成为X的恋人\n是我的幸运\n\n第一次见到X的时候\n她戴着软昵帽\n有着大大的眼睛\n\n这样的X\n是我记忆里见过最美丽的人'}};

function iAff(){G.aff={};G.affH={};G.turn={};DATA[G.id].ms.forEach(function(m){G.aff[m.id]=m.x?40:30;G.affH[m.id]=[G.aff[m.id]];G.turn[m.id]=false;});}
function cA(id,d){if(!G.turn[id]){G.aff[id]=Math.max(0,Math.min(100,G.aff[id]+d));G.affH[id].push(G.aff[id]);}}
function tCheck(){var ms=[];DATA[G.id].ms.forEach(function(m){if(m.x||G.turn[m.id])return;var h=G.affH[m.id];if(h.length>=3&&h[h.length-1]<=h[h.length-2]&&h[h.length-2]<=h[h.length-3]){G.turn[m.id]=true;ms.push(m.e+' '+m.n+' 开始注意其他女嘉宾');}});return ms;}
function gC(){var cs=[];DATA[G.id].ms.forEach(function(m){var h=G.affH[m.id];cs.push({id:m.id,d:h.length>=2?h[h.length-1]-h[h.length-2]:0});});return cs;}
function aPop(cs,fn){var h='<div class="aff-title">✦ 好感度变化 ✦</div>';var any=false;cs.forEach(function(c){if(c.d===0)return;any=true;var m=Mn(c.id);h+='<div class="aff-row"><span class="aff-name">'+m.e+' '+m.n+'</span><span class="aff-change '+(c.d>0?'up':'down')+'">'+(c.d>0?'+':'')+c.d+'</span><span style="font-size:10px;color:rgba(255,255,255,0.2)">'+AL(G.aff[c.id])+'</span></div>';});if(!any)h+='<div style="font-size:10px;color:rgba(255,255,255,0.15)">好感度无明显变化</div>';h+='<div class="aff-tap">点击继续</div>';AP.innerHTML=h;AO.style.display='flex';AP.onclick=function(){AO.style.display='none';if(fn)fn();};}
function DT(n,fn){G._cb=fn;V('<div class="day-title-wrap" onclick="G._cb()"><div class="day-num">DAY '+n+'</div><div class="day-divider"></div><div class="day-sub">'+(n===1?'第一天 · 入住日':n===2?'第二天 · 暧昧萌芽':n===3?'第三天 · 匿名约会':'第'+n+'天')+'</div><div class="day-tap">点击任意处继续</div><div class="day-credit">创作by抖音 妈妈我真有首尔病<br>持续施工中 关注作者以免错失新剧情</div></div>');}

var _glI=0;var _glP=[];var _glC=[];var _glFn=null;
function _glInit(photos,captions,nextFn){_glI=0;_glP=photos;_glC=captions;_glFn=nextFn;_glShow();}
function _glShow(){var i=_glI;var total=_glP.length;
  if(i>=total){if(_glFn)_glFn();return;}
  var h='<div style="min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center">';
  h+='<div style="font-size:9px;color:rgba(200,170,130,0.4);letter-spacing:2px;margin-bottom:10px">✉ 你写给李柱延 · '+(i+1)+'/'+total+'</div>';
  h+='<img src="THE_B_HOUSE_assets/'+_glP[i]+'" style="width:90%;max-height:300px;object-fit:contain;border-radius:10px;border:1px solid rgba(255,255,255,0.08);margin-bottom:14px">';
  h+='<div style="font-size:13px;color:rgba(255,255,255,0.55);line-height:2.2;max-width:300px;white-space:pre-line">'+_glC[i]+'</div>';
  if(i<total-1){h+='<div class="tap-hint" onclick="_glI++;_glShow()">点击翻下一张 →</div>';}
  else{h+='<div class="tap-hint" onclick="_glI++;_glShow()">▼ 点击继续</div>';}
  h+='</div>';V(h);}

function lP(next){var d=DATA[G.id];
  if(G.id==='fa'){
    G._cb=next;
    _glInit(['008t9qsRly1hpke4b9vtbj30u012k4an.jpg','IMG_0483.JPG','007e04Q1gy1hoi5yavnvkj30u011hwo5.jpg','008t9qsRly1hpke5vhek8j30u011e11f.jpg','008t9qsRly1hpke4cf5ifj30zk1bfn2f.jpg'],['我的X是一个很慢热的人\n偶尔也会冷不丁地吐槽\nX走路慢慢的 说话慢慢的','X玩狼人杀的时候总是傻傻相信别人的话','并不是X不够聪明\n而是因为X是善良的人','X从来不对我说谎\n即使很受欢迎\n也从来不会把这当回事','我真心希望X能够幸福\n比任何人都幸福'],next);
  }else{
    G._cb=next;V('<div class="letter-page"><div class="letter-to">✉ 致 '+d.x.n+' · 你的介绍信</div><img src="'+d.ph+'" class="letter-photo"><div class="letter-body">'+d.lp+'</div><div class="letter-from">—— 你</div><div class="letter-actions"><span class="btn" onclick="G._cb()">翻看他的信 →</span></div></div>');

    '第二天。回避的壳更厚了，但壳外的声音更响了。<br><br>“早！李贞！草莓奶昔——”“我不喝甜的。”Eric愣住，然后笑得更亮：“那我去换无糖的！”',
    '金泳勋端着咖啡侧身避开：“……早。昨晚睡得好吗？”你不知道他在问什么。<br><br>裴俊英从二楼下来，西装外套。经过你身边时脚步顿了一下。<br><br>李贤在最后一个出现，径直走向冰箱。转身时目光越过冰箱门上方，直直看向你——嘴角动了一下，他认出昨晚的短信了。'

function d2c_t(){
  C_('✦ 午餐任务 · 厨房 ✦','抽签结果：裴俊英 & 你。他系上围裙。你们在一起两年，你知道他切菜时左手无名指会蜷起来。<br><br>“你想做什么？”他没看你，在洗蔬菜。<br><br>客厅传来动静——女A把燕麦奶往李贤在手边推。他的目光越过她肩膀，看向你。你默默抿嘴。刀在砧板上敲出一声脆响。',null,[{l:'A. “随便。”',a:"d2c_ck('si')"},{l:'B. “……蛋包饭吧。你以前做的那种。”',a:"d2c_ck('me')",p:true},{l:'C. “欧巴最想吃什么？”',a:"d2c_ck('op')"}]);}
function d2c_ck(t){
  if(t==='op'){cA('jb',10);R_('💕','“欧巴最想吃什么？”<br><br>话出口的瞬间，你们俩都僵住了。<br><br><em>欧巴。</em>这个称呼像一颗石子投进结冰的湖面。在一起两年，你叫他欧巴，尤其是在他加班回来给你盖毯子的时候。<br><br>他的耳尖红了。低头洗蔬菜，水流声盖过了声音：“……蛋包饭吧。你以前说，我做的比外面好吃。”<br><br>他笑了——很浅，但真实。这是进这间屋子以来，他第一次笑。',d2c_ex);}
  else if(t==='me'){cA('jb',5);R_('🍳','“……蛋包饭吧。你以前做的那种。”<br><br>他的刀停在砧板上。然后继续切，刀速慢了一拍。他没抬头，但你看到他嘴角动了一下。<br><br>你记得。他也记得。你们都没忘。',d2c_ex);}
  else{cA('jb',-3);R_('😶','“随便。”<br><br>他点了点头，没再问。砧板上的洋葱被切得细碎，刀速均匀。你注意到他的左手无名指蜷起来——两年了，这个习惯还是在。<br><br>他什么都没说。但同样什么都没说，五年前是默契，现在是沉默。',d2c_ex);}
}
function d2c_ex(){
  C_('✦ EX 事件 · 前任回忆夜 ✦','节目组把你带到小黑屋，戴上耳机。三段音频。<br><br><em>第一段：</em>“欧巴，我今天比赛赢了！”“……嗯。你跳得很好看。”“你怎么看到的？”“……我请假了。观众席最后一排。”<br><br><em>第二段：</em>“李贞，我们谈谈。”“没什么好谈的。”“我不是要你换——”“你想让我稳定。我知道了。”<br><br><em>第三段：</em>“分手吧。”“……好。”“你就这么……好？”<br><br>你摘下耳机，脸上全是泪。<br><br>回房间时在走廊撞见裴俊英。他的眼睛也是红的。两米。',null,[{l:'A. 绕过他，回房间。',a:"R_('🚪','你低下头，从他身边走过。袖子擦过他的手背。<br><br>他站在原地。你没回头，所以没看到——他的手在口袋里攥紧又松开。<br><br>房间门关上。走廊灯灭了。',d2c_sms2)"},{l:'B. “欧巴……对不起。”',a:"d2c_op()",p:true}]);}
function d2c_op(){cA('jb',8);R_('💧','“欧巴……对不起。”<br><br>他的肩膀塌下去。走过来，停在你一步之外——这个距离，他能闻到你的洗发水，你能看见他睫毛上的湿意。<br><br>“……为什么道歉？”<br><br>“比赛那次。分手那次。我都没问。我一直在回避。”<br><br>“你现在问了。晚了十个月。”<br><br>“我知道。”<br><br>他笑了一下，不是开心的笑。然后退后一步，给你让出路。',d2c_sms2);}

function d3c(){
  CP("✦ 晨间镜头 ✦",[
    "第三天。职业公布日。<br><br>你下楼时，Eric正在客厅做瑜伽——姿势很丑，但很努力。看见你他立刻弹起来：'李贞！昨晚短信——'他停住，因为你眼下有青黑。'……你没睡好吗？'",
    "裴俊英从厨房出来，端着两杯咖啡。把其中一杯放在桌上——不是给你，是给正好下楼的编剧女B。'谢谢Jacob欧巴~'她笑得温柔，目光却飘向你。裴俊英没看你，转身回了厨房。<br><br>李贤在从健身房出来，头发还湿着。看了你一眼，嘴角动了一下，没说话。金泳勋坐在沙发上看新闻，目光越过平板边缘，在你和李贤在之间扫了一圈。",
    "早餐时，节目组宣布：今晚公布职业。<br><br>'在那之前——'女A晃着咖啡杯，'我们来玩个猜职业的游戏吧。'<br><br>女C合上笔记本：'我拿过手术刀。''医生！'Eric举手。'外科医生。'金泳勋补充。<br><br>裴俊英沉默了一下：'……我在一栋楼里，每天和很多人开会，但没人知道我在做什么。''间谍？'Eric瞎猜。'公务员？'女B说。裴俊英摇头。<br><br>李贤在忽然开口：'我杀过人。'全桌安静。他嘴角带着笑：'合法的。<em>退役特种兵。</em>'"
  ],d3c_gp);}
function d3c_gp(){
  C_("✦ 公共区域 ✦","李贤在的话让全桌安静了。他看向你，像在等你的反应。",null,[
    {l:'A. 低头喝果汁，不参与。',a:"d3c_h('av')"},{l:'B. ……那很累吧。',a:"d3c_h('ca')"},{l:'C. 看向裴俊英：没人知道你在做什么，那你快乐吗？',a:"d3c_h('sh')"}]);}
function d3c_h(t){
  if(t==='ca'){cA('hj',8);R_('🪖','……那很累吧。<br><br>声音不大，但李贤在听见了。他捏着叉子的手顿住——不是害羞，是被戳中的狼狈。他习惯了用肌肉武装自己，没人问过他累不累。<br><br>……你懂什么。他低声说，但不是嘲讽，是防御。<br><br>女A的目光在你和李贤在之间来回。裴俊英看着你——他记得，你以前也是这样，对陌生人温柔，对亲近的人回避。',d3c_g);}
  else if(t==='sh'){cA('jb',5);R_('💼','你看向裴俊英：没人知道你在做什么，那你快乐吗？<br><br>他的咖啡杯停在半空。他看了你很久——那眼神里有十个月的沉默。<br><br>……以前快乐。他说，下班的时候，有人等我。<br><br>全桌安静。女B看着裴俊英看你的眼神，手指在杯沿上停了很久。李贤在的目光在你和他之间扫了一圈。',d3c_g);}
  else{R_('😶','你低头喝果汁，没参与。李贤在的目光在你身上停了一秒——你在回避，他看得出来。然后他移开视线，看向女A。女A正看着他，嘴角带笑。',d3c_g);}
}
function d3c_g(){
  C_("✦ 1对1 · 健身房 ✦","下午，你去了健身房。李贤在果然在。他背对着门，正在举铁，黑色背心被汗浸透。你站在门口，没进去。<br><br>他通过镜子看见了你。动作停了一秒，然后继续举——但节奏乱了。<br><br>你靠在门框上。……来看英雄举铁？他终于开口。放下杠铃，转身，汗水从下巴滴到地板上。朝你走过来，停在你半米外。",null,[
    {l:'A. 沉默，低头看地板。',a:"d3c_gr('av')"},{l:'B. 我不知道回什么。',a:"d3c_gr('ho')"},{l:'C. 欧巴，其实我也每天健身的。明天会见到你吗？',a:"d3c_gr('op')"}]);}
function d3c_gr(t){
  if(t==='op'){cA('hj',10);R_('💪','欧巴，其实我也每天健身的。李贤在的瞳孔缩了一下。<br><br>明天会见到你吗？你问——然后转身，没等他回答。<br><br>李贤在站在原地。汗水滴进眼睛里，他抬手擦了一把，嘴角却往上扯。<em>她在约我。</em>用最轻的话下最重的钩。',d3c_er);}
  else if(t==='ho'){cA('hj',5);R_('💬','我不知道回什么。<br><br>他愣了一下。然后笑——不是挑衅的笑，是某种被诚实打动的笑。<br><br>那就别回。他说，明天七点。你来，或者不来。我都在这。',d3c_er);}
  else{R_('🚪','你沉默，低头看地板。他等了你很久——然后退后一步。<br><br>那就当我没问。他转身回去举铁。杠铃砸在地上的声音比之前重。',d3c_er);}
}
function d3c_er(){
  C_("✦ 走廊 · Eric ✦","健身房外传来脚步声。Eric的声音由远及近：'李贞？你在——'他停在走廊拐角，看见你和李贤在的距离，声音卡住了。<br><br>……啊。你们在忙啊。<br><br>他没走。靠在墙上，手指绞着衣角，像只被主人遗忘在门外的狗。<br><br>你转身——看见他眼眶又红了，但这次不是因为洋葱。",null,[
    {l:'A. 从他身边走过，回房间。',a:"R_('🚶','你从他身边走过。他的手指从衣角上松开。<br><br>走廊里只剩下Eric一个人。他站了很久，然后对着墙说了一句——没事。她只是没看到我。<br><br>然后他去厨房，又开始练颠球。',d3c_rk)"},{l:'B. 伸手拍拍他肩膀。',a:"d3c_eb()"},{l:'C. 你比赛的时候……我想去加油。',a:"d3c_ec()"}]);}
function d3c_eb(){cA('er',3);R_('🐱','你伸手，轻轻拍了拍他肩膀。然后收回。<br><br>Eric愣了一秒，然后笑了，眼睛弯成月牙。……我会加油的！为了你！他转身跑走，背影雀跃得像只终于得到抚摸的金毛。',d3c_rk);}
function d3c_ec(){cA('er',8);R_('⚽','你比赛的时候……我想去加油。<br><br>Eric的眼睛从阴转晴只用了一秒——像只被主人摸头的金毛，尾巴摇得快要起飞：真的？！我下周有场友谊赛！给你留最好的位置！<br><br>他冲过来——想抱你，又刹住。手悬在半空：……可以抱一下吗？<br><br>你伸手，轻轻拍了他肩膀一下。他笑了，像得到了全世界。',d3c_rk);}
function d3c_rk(){
  C_("✦ 心动排名 ✦","节目组通知：第二轮心动排名。你捏着笔，盯着卡片。<br><br>你没注意到——裴俊英站在二楼楼梯口，手里端着一杯凉掉的咖啡。他看见了全部。你叫李贤在'欧巴'。你约他明天见。你拍Eric的肩膀。<br><br>他转身回房间。咖啡倒进洗手池，黑色的液体打着旋消失。",d3c_j);}
function d3c_j(){
  C_("✦ 职业公布 ✦","晚上，所有人聚集在客厅。节目组依次公布职业：<br><br>女A：律师 · 女B：新锐编剧 · 女C：外科医生<br><em>你：啦啦队队员</em><br><br>Eric第一个跳起来：'啦啦队？！下次比赛你来场边——'<br><br>李贤在：退役特种兵 · 金泳勋：高级翻译官<br>裴俊英：三星职员 · Eric：足球球星<br><br>'足球球星和啦啦队队员，'女A晃着红酒杯，'很配啊。'她故意看向裴俊英。<br><br>裴俊英没表情。他看着你，眼神里有十个月的回忆在翻涌——他曾经请假去看你比赛，坐在最后一排，你没看见他。",function(){NT(d3c_sms);});}

  sV("匿名短信","DAY 3 · 深夜");ss("✦ 你必须发出一条短信 ✦");
  G.exTo[3]="女NPC B";sr_("⚡ 前任报告 ⚡<br>你的前任（裴俊英）今晚将短信发给了<br><b>女NPC B</b>");

function d4a(){
  CP('✦ 晨间镜头 ✦',[
    '早上七点，客厅。<br>经过了昨天的约会，气氛变了。<br><br>以往孙英宰总在和姜宥真打打闹闹，<br>今天破天荒没有出现。<br><br>朴瑞妍则和裴俊英站在落地窗前闲聊，<br>背影看起来很相配。',
    '李贤在从厨房出来，拉着你衣服的一角拽你进了厨房。<br>他把手探上你脸颊，“没发烧吗？怎么这么红。”<br>自己的脸却在说完这句话后爆红...<br><br>李柱延坐在沙发边，逗弄节目组带来的小猫。<br>他的手指节分明，一遍遍抚摸过小猫的脊背，<br>又挠挠小猫的脸颊。<br>只有你，看到这一幕瞳孔微缩——<br>他穿的是曾经你给他买的情侣衣。<br>他在勾引你。'
  ],d4a_rank);}
function d4a_rank(){C_("✦ 心动排名 ✦","节目组宣布：写下对四位异性的心动顺序。<br><br>李贤在看向你：“你觉得自己会排第几？”<br>“我猜你会排第一。”姜宥真说，“在某些人心里。”她目光扫过裴俊英，又扫过李贤在，最后落在李柱延身上。",d4a_hj);}
function d4a_hj(){
  C_('✦ 楼梯口 · 李贤在 ✦','你上楼放卡片。李贤在靠在扶手上。<br><br>“你写了谁第一？”<br>“不告诉你。”<br>“我猜是裴俊英。或者……你在等某个人改变顺序？”<br><br>他从你身边走过，交错时突然靠近你，“今晚两点，厨房有夜宵。”',d4a_jb);}
function d4a_jb(){
  C_('✦ 花园 ✦','下午，李柱延在花园里抽烟。裴俊英从侧门出来。<br><br>“昨天为什么选机票？”<br>裴俊英的笑里透露着一种恍然大悟，原来你的前任是李柱延。<br>“我想知道，是什么样的过去，值得让一个女生不顾体面也要挽留。”<br><br>“裴俊英。”<br>“怎么了？”<br>“知道得少，反而轻松。”<br>“那恐怕不能如你所愿了，”裴俊英转身回到小屋。<br><br>李柱延没说什么，灭了烟。<br>他在窗外看向你们交谈的背影，站了很久。',d4a_ex);}
function d4a_ex(){
  CP('✦ EX 事件 ✦',[
    '凌晨两点十二分，你从厨房出来。<br>李贤在的啤酒还留在舌尖上，微苦。<br><br>你忍不住开始想象他的吻，<br>是否也是这样温柔中有着苦涩的霸道。',
    '走廊尽头，李柱延站在你房间的门前等你。<br>灯光从里面漏出来，像飞机着陆灯，闪烁着孤寂。<br>他没有质问你刚刚去哪了，现在的他也没有资格这么做。<br><br>你看到他手上拿着那张KE704的机票。<br><br>“你拿回来了。”你说。<br>“裴俊英还给我的，”他抬手仿佛想抚摸你的头发，却又放下了。<br>“他说——无论怎样，这个不应该在他手里。”',
    '你伸出手，想拿回机票。<br>你曾给过他那么多次机会，已经够了。<br>然而，李柱延慢慢把自己的脸凑近你摊开的掌心。<br><br>你没忍住，泪从脸颊滑过。<br>曾经多少次，你们在一起的时候，<br>他就是这样讨好生气了的你。<br><br>李柱延，为什么。<br>即使到现在你都可以这么游刃有余。<br>为什么，我却忍不住被你感动。<br><br>你想起这些天他对你的冷淡，<br>李贤在不容拒绝的体贴，裴俊英的温柔等待...<br>对他既说不出决绝的狠话，也无法做到完全原谅。'
  ],d4a_hid);}
function d4a_hid(){
  C_('✦ 隐藏镜头 ✦','姜宥真在房间里打开李贤在给她的卡片：<br>“口红颜色很适合你。”<br>她把卡片贴在胸口，然后撕掉，扔进垃圾桶。<br><br>徐敏荷凌晨起来喝水，看到你的房间里透出灯光。<br>她站了一会儿。水杯里的冰化了，她没喝。<br><br>健身房里，李贤在还在跑步。<br>他的心像小鸟般雀跃，反复想起凌晨两点零三分的厨房，你推门进来的瞬间。<br><br>裴俊英在阳台上。看到你的灯亮着，又灭了。<br>他拿出手机，打了几个字又删掉。<br>最后他关掉手机。<br><br>孙英宰和朴瑞妍则在露台长谈。<br>酒一瓶接着一瓶，直到天亮。<br>两个人脸上也满是泪痕。',function(){NT(d4a_sms);});}
function d4a_sms(){sV("匿名短信","DAY 4 · 深夜");sb("对不起。","him");sb("下次想吃什么？","him");ss("— 你收到了 2 条 —");G.exTo[4]="你";sr_("✦ 前任报告 ✦<br>你的前任（李柱延）今晚将短信发给了<br><b>你</b>");sn_("来小屋的第四天。X第一次选择了我。");sa([{l:"A. 发给李柱延：为什么...",a:function(){d4a_s("jy","为什么...")}},{l:"B. 发给裴俊英：做什么能让你开心🪽",a:function(){d4a_s("jb","做什么能让你开心🪽")}},{l:"C. 发给李贤在：每天都想见到欧巴",a:function(){d4a_s("hj","每天都想见到欧巴")}}]);}
function d4a_s(to,msg){G.meTo[4]=to;sV("匿名短信","DAY 4 · 深夜");if(to==="jy")cA("jy",5);else if(to==="jb")cA("jb",5);else cA("hj",8);sb(msg,"her");sn_("发送成功。<br><br>你闭上眼睛，回想今天的一切。");aPop(gC(),function(){tCheck();sa([{l:"DAY 4 结束 · 进入 DAY 5",a:function(){DT(5,d5);},p:true}]);});}

function d5a(){C_("✦ 晨间镜头 ✦","早上七点。你下楼时发现客厅里只有一个人。<br>李柱延坐在餐桌边，面前放着一杯冷掉的黑咖啡。<br>他大概坐了有一会儿了。<br>也许在等你，也许在等别人。<br><br>你对他的这种沉默很习以为常。<br>他不懂怎么甜言蜜语，<br>只会安静地用行为示好。<br><br>李贤在听见你下楼，<br>从房间出来径直走到你身边。<br>他从你手里拿走水杯，从冰箱里倒了燕麦奶。<br>“昨天喝了啤酒，这个对胃好。”<br><br>客厅里三个人的呼吸声。<br>然后李柱延站起来，<br>把冷了的黑咖啡倒掉，出去了。",d5a_task);}
function d5a_task(){C_("✦ 任务 · 前任问题 ✦","节目组宣布：抽取卡片回答关于前任的问题。<br><br>裴俊英看向你：“你怕吗？”<br>“怕，”你顿了顿，<br>“曾经我以为我的前任已经做了选择，可我突然不知道了。”<br><br>李柱延正在倒水，手指顿了一下。<br>水溢出来，他没发现。",d5a_ans);}

function d5a_ans(){C_("✦ 前任问题 · 回答 ✦","<em>李柱延抽到：想和X复合吗？</em><br><br>“我希望我的X能够幸福，幸福的标准在她。”<br><br><em>你抽到：为什么和X分手？</em><br><br>“我们的职业决定了在一起的时间很少，”我顿了顿，<br>“前任不能给我安全感。”<br><br><em>李贤在抽到：复合和换乘的决心哪个多？</em><br><br>“我想我遇到了愿意用一切换她认可的人。”",function(){NT(d5a_sms);});}

function d5c(){C_("✦ 晨间镜头 ✦","第五天。猜前任环节。<br><br>你六点五十到健身房，李贤在已经在举铁。他看见你，杠铃差点脱手。<br><br>'……不是七点？''我准时。你六点到的。'<br><br>他耳尖红了，把燕麦奶递给你。你们坐在地板上喝着燕麦奶。他忽然说：'李贞，我今天猜前任，会猜裴俊英。你们的眼神——像烧过又灭掉的火。但我还是会选你。不管你是不是他的前任。'",d5c_guess);}
function d5c_guess(){C_("✦ 任务 · 猜前任 ✦","晚上，节目组公布每位嘉宾的猜测。女A猜你的前任是Eric，女B猜李贤在，女C猜金泳勋。<br><br>李贤在在卡片上写了裴俊英。只写了一行字：'他给她煎蛋的样子，像做过一千次。'<br><br>Eric也写了裴俊英。他画了一只狗和一个煎蛋。<br><br>金泳勋写的是李贤在。'健身房的气氛。只有前任才能制造那种沉默。'<br><br>全部公开之后，李贤在看了你一眼。那一秒里有很多东西——他猜对了，但这不是他想猜对的答案。",d5c_reveal);}
function d5c_reveal(){C_("✦ 前任公布 ✦","主持人打开最后一个信封。屏幕上打出四对名字：<br><br>李贞 & 裴俊英(Jacob)<br>李贤在 & 女A(律师)<br>金泳勋 & 女B(编剧)<br>Eric & 女C(外科医生)<br><br>全场安静了大概五秒。<br><br>李贤在看着女A。女A也在看他——这两人之间的空气突然有了形状。律师和特种兵。打过十七小时庭审的人，和杀过人的人。<br><br>Eric挠了挠头，看向女C。女C面无表情地翻了一页杂志。但他耳朵红了。<br><br>裴俊英站起来。他没有看女B。他走向你——在所有人的目光下，他停在你面前。<br><br>'李贞。'他叫你的全名，声音很轻，像怕你回避，'来这个节目之后，我一直在想一件事。'<br><br>你抬头看他。<br><br>'我猜错了很多人。但我从头到尾——只选了你。'<br><br>他说完，没有等你回答。他转身走出客厅，手里还攥着那张X Room里拿回来的围巾。<br><br>女B坐在沙发上，低头看着自己的手指。她早就猜到了。她只是刚才没说。",function(){NT(d5c_sms);});}
