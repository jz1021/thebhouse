<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

body{background:#0a0a12;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"PingFang SC","Noto Serif SC",serif;padding:20px}
.phone{width:380px;height:700px;background:#161820;border-radius:28px;padding:10px;box-shadow:0 16px 48px rgba(0,0,0,0.5);border:2px solid #22242c;position:relative}
.screen{width:100%;height:100%;background:#0e0f16;border-radius:20px;overflow:hidden;position:relative}

.day-title-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
.day-num{font-size:56px;color:#d8ccb8;font-weight:300;letter-spacing:8px;animation:fadeUp .6s ease}
.day-divider{width:40px;height:1px;background:rgba(200,170,130,0.4);margin:16px auto;animation:fadeUp .6s ease .1s both}
.day-sub{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:3px;animation:fadeUp .6s ease .2s both}
.day-tap{font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:2px;margin-top:40px;animation:pulse 2s ease infinite}
.night-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;animation:nightIn .5s ease}

.night-rules{font-size:11px;color:rgba(255,255,255,0.3);line-height:2.2;margin-bottom:24px;max-width:280px}

.letter-page{min-height:100%;display:flex;flex-direction:column;padding:30px 24px}

.tap-hint{text-align:center;font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:2px;padding:16px 0;cursor:pointer;margin-top:8px}

.sms-top{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px}
.sms-top .title-sms{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1px}

.sms-log{flex:1;padding:16px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.sms-sys{font-size:9px;color:rgba(255,255,255,0.13);letter-spacing:2px;padding:3px 10px;text-align:center}
.sms-time{font-size:9px;color:rgba(255,255,255,0.08);text-align:center}
.sms-bub{max-width:82%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.8}
.sms-bub.her{align-self:flex-end;background:rgba(180,150,110,0.1);color:rgba(255,255,255,0.55);border-bottom-right-radius:4px}
.sms-bub.him{align-self:flex-start;background:#181a24;color:rgba(255,255,255,0.45);border-bottom-left-radius:4px}
.sms-bub.narr{align-self:stretch;background:transparent;color:rgba(255,255,255,0.4);font-size:12px;line-height:2;padding:6px 4px;max-width:100%;border-radius:0}
.sms-report{text-align:center;padding:8px 14px;border-radius:8px;background:rgba(200,70,50,0.05);border:1px solid rgba(200,70,50,0.1);font-size:10px;color:rgba(255,255,255,0.2);line-height:1.6}

.end-card .lbl{padding:6px;font-size:9px;color:rgba(255,255,255,0.3);text-align:center;background:#111119}
.end-card .badge{font-size:7px;color:#c8a870;padding:3px;text-align:center;background:#0a0a12;letter-spacing:1px}
.id-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.id-card{width:145px;padding:20px 12px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:#111119;cursor:pointer;text-align:center;transition:.2s}
.id-card:hover{border-color:rgba(180,150,110,0.3)}
.id-card .emoji{font-size:36px;margin-bottom:8px}
.id-card .name{font-size:13px;color:#ccc;letter-spacing:1px}
.btn{padding:10px 22px;border-radius:8px;border:1px solid rgba(180,150,110,0.35);background:rgba(180,150,110,0.06);color:#c8a870;font-size:11px;cursor:pointer;letter-spacing:1px;transition:.2s;display:inline-block;text-decoration:none}
.btn:hover{background:rgba(180,150,110,0.16)}
.btn.primary{background:rgba(180,150,110,0.16);border-color:rgba(200,170,130,0.5)}
</style>
</head>

<script>
// GAME STATE
var G={id:'',day:1,aff:{},affH:{},turn:{},exTo:{},meTo:{},_cb:null};
var S_=document.getElementById('screen'),AO=document.getElementById('affOverlay'),AP=document.getElementById('affPopup');

function V(h){S_.innerHTML='<div class="view">'+h+'</div>';}
function Q(id){return document.getElementById(id);}
function Mn(id){return DATA[G.id].ms.find(function(m){return m.id===id;});}
function AL(v){return v>=70?'❤️❤️❤️':v>=50?'❤️❤️':v>=30?'❤️':'🤍';}

var DATA={
fa:{p:{n:'你',a:26},x:{n:'李柱延',id:'jy',a:30,e:'✈️'},ms:[{id:'jy',n:'李柱延',a:30,e:'✈️',x:1},{id:'hj',n:'李贤在',a:27,e:'🩺',x:0},{id:'jb',n:'裴俊英',a:28,e:'📷',x:0},{id:'er',n:'孙英宰',a:23,e:'🏀',x:0}],fD:'<b>姜宥真</b>：外向主动，大大咧咧实则敏感，很会撒娇。笑的时候右手会攥紧杯柄。<br><br><b>徐敏荷</b>：冷静理性，话不多，气场强。不主动但很有存在感，不笑的时候像杂志模特。<br><br><b>朴瑞妍</b>：温柔文艺，说话轻声细语，容易让人有保护欲。及腰黑长直，皮肤白得几乎透明。',mt:'你们在培训上认识。他是学员，你是新人。模拟舱那天，他坐你斜对面，全程没说一句话。后来你问他——他说，怕一开口就再也装不了冷静。',bu:'分手是你提的。五年了，他从来不说“为了你”。给你倒水，只是倒；给你垫靠垫，只是垫。你等他说，他等你看懂。等到最后，你累了。不是不爱了，是累了。',ph:'THE_B_HOUSE_assets/8b511c18gy1h8vgemc76sj20xc0xcajc.jpg',lp:'我的X是一个很慢热的人\n偶尔也会冷不丁地吐槽\n\nX走路慢慢的\n说话慢慢的\n\nX玩狼人杀的时候总是傻傻相信别人的话\n并不是X不够聪明\n而是因为X是善良的人\n\nX从来不对我说谎\n即使很受欢迎\n也从来不会把这当回事\n\nX很会关心别人\n但是不喜欢邀功\n\nX的幽默不难懂\n只是需要点耐心\n\nX情绪不好的时候不会说话\n只要抱抱他就好了\n\n如果X在这里遇到谁\n希望那个人能看懂X的顺手\n也能理解他的安静',le:'X总说我记不住事\n但关于X的事\n我常常会突然想起来\n然后愣住\n\nX第一次来我家\n带了一盆薄荷\n\nX有些怕生\n给人的第一印象就像薄荷一样冰凉\n但熟悉X的人会知道\nX其实像夏天的冰块一样让人舒心\n\nX很有主见\n是那种会让人放心的人\n但在恋人面前的X\n也会像小孩子一样撒娇\n\n和X在一起\n每天都能看到不一样可爱的她\n是男朋友的幸运\n\nX不太笑\n但笑起来左边先翘\n她自己不知道\n\nX喜欢热的东西\n热汤，热咖啡\n还有活泼的、热烈的心\nX值得世界上最好、最温暖的一切'},
ch:{p:{n:'李贞',a:24},x:{n:'裴俊英(Jacob)',id:'jb',a:27,e:'💼'},ms:[{id:'jb',n:'裴俊英(Jacob)',a:27,e:'💼',x:1},{id:'hj',n:'李贤在',a:26,e:'🪖',x:0},{id:'yh',n:'金泳勋',a:28,e:'🌐',x:0},{id:'er',n:'孙英宰(Eric)',a:25,e:'⚽',x:0}],fD:'<b>女A·律师</b>：成熟型。气场强，不卑不亢，递东西的动作像递名片。<br><br><b>女B·编剧</b>：温柔型。声音软软的，会帮人摆盘子，容易被靠近。<br><br><b>女C·外科医生</b>：成熟型。话不多但每句都精准，习惯把手机扣在床头柜上。',mt:'他是你朋友的哥哥。第一次见面在朋友家客厅——他加班回来，手里提着便利店袋子。你坐在沙发上看比赛回放，他路过时看了一眼屏幕，说“你跳得很好看。”那是第一次有人不问你“为什么做这个”，只是说你好看。',bu:'分手是他提的。他希望你能找一份“稳定”的工作——不是不喜欢，是担心你受伤，担心你练到深夜没人接。你说他不理解你，他说你太回避。最后一次吵架，他问你“你到底想要什么”，你沉默了。他说分手吧，你说了好，快得不像话。十个月后你才知道——那天晚上，他在车里坐了四个小时。',ph:'THE_B_HOUSE_assets/SaveClip.App_564259307_17974045274954379_9160089034478819477_n.jpg',lp:'Jacob是我见过最聪明的男人\n也是最贴心的男人\n\nX是我朋友的哥哥\n从小是优等生的X\n尽管工作很忙\n也注重家庭与身边的人\n\n出去吃饭\nX会记得身边的人忌口\n朋友的生日\nX也会准备好礼物提前送去\n\nX的父母也很亲切\n也许正是这样温暖的家庭\n才会培养出X一样天使般善良的人\n\n作为恋人的X 还要更加美好\n是在X的照料下\n我学会变成一个靠谱、不冷漠的人\n\n任何人靠近X\n都会明白我所说一切\n\n我真心希望X能够幸福\n比任何人都幸福',le:'我所认识的X\n既有孩童的天真烂漫\n也有作为女人的成熟与美好\n\nX对恋人非常坦率\n脱口而出的话语能让我幸福很久\n\nX是一个非常会表达爱的人\n\nX很受欢迎\n我周围所有的男生都认识X\n但X从来不会让我感觉不安全\n\nX是善良又有边界的人\n\n能成为X的恋人\n是我的幸运\n\n第一次见到X的时候\n她戴着软昵帽\n有着大大的眼睛\n\n这样的X\n是我记忆里见过最美丽的人'}};

function iAff(){G.aff={};G.affH={};G.turn={};DATA[G.id].ms.forEach(function(m){G.aff[m.id]=m.x?40:30;G.affH[m.id]=[G.aff[m.id]];G.turn[m.id]=false;});}
function cA(id,d){if(!G.turn[id]){G.aff[id]=Math.max(0,Math.min(100,G.aff[id]+d));G.affH[id].push(G.aff[id]);}}
function tCheck(){var ms=[];DATA[G.id].ms.forEach(function(m){if(m.x||G.turn[m.id])return;var h=G.affH[m.id];if(h.length>=3&&h[h.length-1]<=h[h.length-2]&&h[h.length-2]<=h[h.length-3]){G.turn[m.id]=true;ms.push(m.e+' '+m.n+' 开始注意其他女嘉宾');}});return ms;}
function gC(){var cs=[];DATA[G.id].ms.forEach(function(m){var h=G.affH[m.id];cs.push({id:m.id,d:h.length>=2?h[h.length-1]-h[h.length-2]:0});});return cs;}
function aPop(cs,fn){var h='<div class="aff-title">✦ 好感度变化 ✦</div>';var any=false;cs.forEach(function(c){if(c.d===0)return;any=true;var m=Mn(c.id);h+='<div class="aff-row"><span class="aff-name">'+m.e+' '+m.n+'</span><span class="aff-change '+(c.d>0?'up':'down')+'">'+(c.d>0?'+':'')+c.d+'</span><span style="font-size:10px;color:rgba(255,255,255,0.2)">'+AL(G.aff[c.id])+'</span></div>';});if(!any)h+='<div style="font-size:10px;color:rgba(255,255,255,0.15)">好感度无明显变化</div>';h+='<div class="aff-tap">点击继续</div>';AP.innerHTML=h;AO.style.display='flex';AP.onclick=function(){AO.style.display='none';if(fn)fn();};}
function DT(n,fn){G._cb=fn;V('<div class="day-title-wrap" onclick="G._cb()"><div class="day-num">DAY '+n+'</div><div class="day-divider"></div><div class="day-sub">'+(n===1?'第一天 · 入住日':n===2?'第二天 · 暧昧萌芽':n===3?'第三天 · 匿名约会':'第'+n+'天')+'</div><div class="day-tap">点击任意处继续</div></div>');}
function lP(next){var d=DATA[G.id];G._cb=next;V('<div class="letter-page"><div class="letter-to">✉ 致 '+d.x.n+' · 你的介绍信</div><img src="'+d.ph+'" class="letter-photo"><div class="letter-body">'+d.lp+'</div><div class="letter-from">—— 你</div><div class="letter-actions"><span class="btn" onclick="G._cb()">翻看他的信 →</span></div></div>');}
function lE(next){var d=DATA[G.id];G._cb=next;V('<div class="letter-page"><div class="letter-to">✉ 来自 '+d.x.n+' · 写给你的介绍信</div><img src="'+d.ph+'" class="letter-photo"><div class="letter-body">'+d.le+'</div><div style="font-size:10px;color:rgba(255,255,255,0.2);line-height:1.8;margin:14px 0;padding:14px 0;border-top:1px solid rgba(255,255,255,0.05);"><b style="color:rgba(255,255,255,0.4)">相识</b> '+d.mt+'<br><br><b style="color:rgba(255,255,255,0.4)">分手</b> '+d.bu+'</div><div class="letter-from">—— '+d.x.n+'</div><div class="letter-actions"><span class="btn primary" onclick="G._cb()">走进小屋 →</span></div></div>');}
function C_(s,t,n,cs){var h='<div class="narr-wrap">';if(s)h+='<div class="narr-scene">'+s+'</div>';h+='<div class="narr-text">'+t+'</div>';if(cs&&cs.length){h+='<div class="choices-wrap">';cs.forEach(function(o){h+='<div class="choice-btn'+(o.p?' pick':'')+'" onclick="'+o.a+'">'+o.l+'</div>';});h+='</div>';}else if(n){G._cb=n;h+='<div class="tap-hint" onclick="G._cb()">点击继续</div>';}h+='</div>';V(h);}
var _i=0,_p=[],_s='',_n=null,_o=null;

function d2a_p2(){

function d2a_h(){C_('✦ 隐藏镜头 ✦','姜宥真试了三套衣服，最后选了最普通的。“不能比他耀眼，会被看穿。”<br><br>徐敏荷注意到李柱延切菜的手法。“你常做饭？”“以前做。现在不做了。”<br><br>裴俊英在洗手间洗了很久的脸。拿出手机，打了删了，最后只打了一个字。<br><br>Eric偷偷把好的部分夹给朴瑞妍。她吃了说好吃。姜宥真看到了，低头喝了口汤。',function(){NT(d2a_sms);});}

    '第二天。回避的壳更厚了，但壳外的声音更响了。<br><br>“早！李贞！草莓奶昔——”“我不喝甜的。”Eric愣住，然后笑得更亮：“那我去换无糖的！”',
    '金泳勋端着咖啡侧身避开：“……早。昨晚睡得好吗？”你不知道他在问什么。<br><br>裴俊英从二楼下来，西装外套。经过你身边时脚步顿了一下。<br><br>李贤在最后一个出现，径直走向冰箱。转身时目光越过冰箱门上方，直直看向你——嘴角动了一下，他认出昨晚的短信了。'

function d2c_t(){
  C_('✦ 午餐任务 · 厨房 ✦','抽签结果：裴俊英 & 你。他系上围裙。你们在一起两年，你知道他切菜时左手无名指会蜷起来。<br><br>“你想做什么？”他没看你，在洗蔬菜。<br><br>客厅传来动静——女A把燕麦奶往李贤在手边推。他的目光越过她肩膀，看向你。你默默抿嘴。刀在砧板上敲出一声脆响。',null,[{l:'A. “随便。”',a:"d2c_ck('si')"},{l:'B. “……蛋包饭吧。你以前做的那种。”',a:"d2c_ck('me')",p:true},{l:'C. “欧巴最想吃什么？”',a:"d2c_ck('op')"}]);}
function d2c_ck(t){
  if(t==='op'){cA('jb',10);R_('💕','“欧巴最想吃什么？”<br><br>话出口的瞬间，你们俩都僵住了。<br><br><em>欧巴。</em>这个称呼像一颗石子投进结冰的湖面。在一起两年，你叫他欧巴，尤其是在他加班回来给你盖毯子的时候。<br><br>他的耳尖红了。低头洗蔬菜，水流声盖过了声音：“……蛋包饭吧。你以前说，我做的比外面好吃。”<br><br>他笑了——很浅，但真实。这是进这间屋子以来，他第一次笑。',d2c_ex);}
  else if(t==='me'){cA('jb',5);R_('🍳','“……蛋包饭吧。你以前做的那种。”<br><br>他的刀停在砧板上。然后继续切，刀速慢了一拍。他没抬头，但你看到他嘴角动了一下。<br><br>你记得。他也记得。你们都没忘。',d2c_ex);}
  else{cA('jb',-3);R_('😶','“随便。”<br><br>他点了点头，没再问。砧板上的洋葱被切得细碎，刀速均匀。你注意到他的左手无名指蜷起来——两年了，这个习惯还是在。<br><br>他什么都没说。但同样什么都没说，五年前是默契，现在是沉默。',d2c_ex);}
}
function d2c_ex(){
  C_('✦ EX 事件 · 前任回忆夜 ✦','节目组把你带到小黑屋，戴上耳机。三段音频。<br><br><em>第一段：</em>“欧巴，我今天比赛赢了！”“……嗯。你跳得很好看。”“你怎么看到的？”“……我请假了。观众席最后一排。”<br><br><em>第二段：</em>“李贞，我们谈谈。”“没什么好谈的。”“我不是要你换——”“你想让我稳定。我知道了。”<br><br><em>第三段：</em>“分手吧。”“……好。”“你就这么……好？”<br><br>你摘下耳机，脸上全是泪。<br><br>回房间时在走廊撞见裴俊英。他的眼睛也是红的。两米。',null,[{l:'A. 绕过他，回房间。',a:"R_('🚪','你低下头，从他身边走过。袖子擦过他的手背。<br><br>他站在原地。你没回头，所以没看到——他的手在口袋里攥紧又松开。<br><br>房间门关上。走廊灯灭了。',d2c_sms2)"},{l:'B. “欧巴……对不起。”',a:"d2c_op()",p:true}]);}
function d2c_op(){cA('jb',8);R_('💧','“欧巴……对不起。”<br><br>他的肩膀塌下去。走过来，停在你一步之外——这个距离，他能闻到你的洗发水，你能看见他睫毛上的湿意。<br><br>“……为什么道歉？”<br><br>“比赛那次。分手那次。我都没问。我一直在回避。”<br><br>“你现在问了。晚了十个月。”<br><br>“我知道。”<br><br>他笑了一下，不是开心的笑。然后退后一步，给你让出路。',d2c_sms2);}

function d3(){G.day=3;if(G.id==='fa')d3a();else d3c();}

function d3a(){

    '你凌晨四点醒了。不是被吵醒的——身体里的航班时钟在响。<br><br>李柱延连续两天：朴瑞妍、徐敏荷。就是不肯发给你。<br><br>你下楼时眼睛下面有淡淡的青。裴俊英在厨房：“浅烘的，还是深烘的？”“深烘。越苦越好。”',
    '李贤在从二楼下来，笑了一下。“好吃？”<br><br>“我收到了。只有两个字，但我想了二十分钟该回什么。”“那你回了什么？”他笑：“你猜。”<br><br>你没猜，转身去倒水。李柱延坐在餐桌边，一杯黑咖啡。抬头看了你一眼，目光在眼睛下面停了一秒，移开。没说话。'
  ],d3a_dp);}
function d3a_dp(){
  C_('✦ 任务 · 匿名信物约会 ✦','节目组宣布：四位女嘉宾各自准备约会方案和信物，放进木盒。男嘉宾根据信物选择——不知道背后是谁。<br><br>姜宥真：“去试一件不敢穿的衣服！”徐敏荷画草图：“拆除中的建筑天台。”朴瑞妍轻声说：“深夜唱片店。”<br><br>你已经在想那张机票存根了——KE704，2019年12月，成田-首尔。在你行李箱夹层里，放了五年。',d3a_jy);}
function d3a_jy(){
  C_('✦ 走廊 · 李柱延 ✦','你把机票存根拿出来。写卡片：<em>“去机场滩涂，看飞机低空掠过，吃一碗热汤面。——要一起吗？”</em><br><br>门没关。李柱延站在走廊上。<br><br>“KE704。”他说，声音低得几乎听不见。<br><br>“你留着。”“我留着很多东西。不是每件都有用。”<br><br>他看着你，像驾驶舱里的天气雷达图——绿蓝里藏着红色。<br><br>“那就别放出去。”“为什么？”他没回答。灯灭了。再亮时，他走了。',d3a_jb);}
function d3a_jb(){
  C_('✦ 客厅 · 裴俊英 ✦','你下楼放信封。裴俊英在调相机。<br><br>“信物？”“嗯。”“我能看看吗？”<br><br>他打开信封，看到机票存根。<br><br>“旧物。比新东西诚实。有折痕，有褪色，有水渍。它经历过什么——骗不了人。”<br><br>“你选的时候，会选这个吗？”<br><br>他看着你，很久。<br><br>“会。因为我想知道，是谁把一段过去放在这里——还敢让人选。”',d3a_tk);}
function d3a_tk(){
  C_('✦ 信物选择 ✦','晚上八点。木盒里的四件信物：<br><br>1. 珊瑚色口红——“去试一件不敢穿的衣服。”<br>2. 银色比例尺——“去拆除中的建筑天台。”<br>3. 无封面黑胶——“去深夜唱片店。”<br>4. 机票存根 KE704——“去机场滩涂，吃一碗热汤面。”<br><br>李柱延第一个走到木盒前。拿起机票存根——翻到背面，指腹蹭过航班号。他闭了闭眼。放下。拿起了比例尺。<br><br>裴俊英第二个。直接拿了机票存根。<br><br>李贤在拿起口红：“有意思。”<br><br>Eric拿了黑胶。',d3a_dt);}
function d3a_dt(){

    '<em>裴俊英 & 你 · 机场滩涂</em><br><br>他看到你时愣了一下，然后笑：“原来是你。”“失望了？”“不。是确定了。”<br><br>远处一架飞机降落，引擎声轰鸣。你下意识报出：“KE704，高度300，速度140。”<br><br>裴俊英看着你。“习惯。”“不是习惯。是条件反射。像叫一个名字。”<br><br>远处堤坝上——徐敏荷的黑色外套被风吹起来，李柱延站在她旁边，正看向你们。',
    '<em>李柱延 & 徐敏荷 · 天台</em><br><br>“你选这个，想逃开什么？”“只是想看点确定的东西。”“拆除中的建筑，可不确定。”“至少它要倒的时候，”他说，“会发出声音。”<br><br>他看向远处——滩涂。“KE704。”他轻声说。徐敏荷没听清。',
    '<em>李贤在 & 姜宥真 · 口红</em><br><br>三支口红。他一支支拿起来。“这支太艳。这支太淡。这支——你涂过。”“你怎么知道？”“管身有磨损，膏体斜切面是向右的。”<br><br>姜宥真从镜子里看他。他俯身，把口红递给她。她接过，指尖碰到他的手指。没躲。',
    '<em>Eric & 朴瑞妍 · 唱片店</em><br><br>“你耳朵红了。”“店里太热了。”“凌晨两点，不热。”<br><br>Eric盯着转动的唱片：“这歌叫什么？”<br><br>“Almost Blue。”朴瑞妍说。“几乎，是蓝色。”'
  ],d3a_ex);}
function d3a_ex(){
  C_('✦ EX 事件 ✦','回程。裴俊英的车在路口等红灯。旁边的出租车后座——李柱延和徐敏荷。<br><br>徐敏荷在说话。李柱延看着窗外——目光正对上你的。<br><br>隔着两层玻璃对视。红灯，九十秒。<br><br>你手里攥着机票存根。裴俊英看到了。他打开收音机。很吵的摇滚乐。<br><br>绿灯。两辆车分开。',d3a_hd);}
function d3a_hd(){

function d3c(){
  CP("✦ 晨间镜头 ✦",[
    "第三天。职业公布日。<br><br>你下楼时，Eric正在客厅做瑜伽——姿势很丑，但很努力。看见你他立刻弹起来：'李贞！昨晚短信——'他停住，因为你眼下有青黑。'……你没睡好吗？'",
    "裴俊英从厨房出来，端着两杯咖啡。把其中一杯放在桌上——不是给你，是给正好下楼的编剧女B。'谢谢Jacob欧巴~'她笑得温柔，目光却飘向你。裴俊英没看你，转身回了厨房。<br><br>李贤在从健身房出来，头发还湿着。看了你一眼，嘴角动了一下，没说话。金泳勋坐在沙发上看新闻，目光越过平板边缘，在你和李贤在之间扫了一圈。",
    "早餐时，节目组宣布：今晚公布职业。<br><br>'在那之前——'女A晃着咖啡杯，'我们来玩个猜职业的游戏吧。'<br><br>女C合上笔记本：'我拿过手术刀。''医生！'Eric举手。'外科医生。'金泳勋补充。<br><br>裴俊英沉默了一下：'……我在一栋楼里，每天和很多人开会，但没人知道我在做什么。''间谍？'Eric瞎猜。'公务员？'女B说。裴俊英摇头。<br><br>李贤在忽然开口：'我杀过人。'全桌安静。他嘴角带着笑：'合法的。<em>退役特种兵。</em>'"
  ],d3c_gp);}
function d3c_gp(){
  C_("✦ 公共区域 ✦","李贤在的话让全桌安静了。他看向你，像在等你的反应。",null,[
    {l:'A. 低头喝果汁，不参与。',a:"d3c_h('av')"},{l:'B. ……那很累吧。',a:"d3c_h('ca')"},{l:'C. 看向裴俊英：没人知道你在做什么，那你快乐吗？',a:"d3c_h('sh')"}]);}
function d3c_h(t){
  if(t==='ca'){cA('hj',8);R_('🪖','……那很累吧。<br><br>声音不大，但李贤在听见了。他捏着叉子的手顿住——不是害羞，是被戳中的狼狈。他习惯了用肌肉武装自己，没人问过他累不累。<br><br>……你懂什么。他低声说，但不是嘲讽，是防御。<br><br>女A的目光在你和李贤在之间来回。裴俊英看着你——他记得，你以前也是这样，对陌生人温柔，对亲近的人回避。',d3c_g);}
  else if(t==='sh'){cA('jb',5);R_('💼','你看向裴俊英：没人知道你在做什么，那你快乐吗？<br><br>他的咖啡杯停在半空。他看了你很久——那眼神里有十个月的沉默。<br><br>……以前快乐。他说，下班的时候，有人等我。<br><br>全桌安静。女B看着裴俊英看你的眼神，手指在杯沿上停了很久。李贤在的目光在你和他之间扫了一圈。',d3c_g);}
  else{R_('😶','你低头喝果汁，没参与。李贤在的目光在你身上停了一秒——你在回避，他看得出来。然后他移开视线，看向女A。女A正看着他，嘴角带笑。',d3c_g);}
}
function d3c_g(){
  C_("✦ 1对1 · 健身房 ✦","下午，你去了健身房。李贤在果然在。他背对着门，正在举铁，黑色背心被汗浸透。你站在门口，没进去。<br><br>他通过镜子看见了你。动作停了一秒，然后继续举——但节奏乱了。<br><br>你靠在门框上。……来看英雄举铁？他终于开口。放下杠铃，转身，汗水从下巴滴到地板上。朝你走过来，停在你半米外。",null,[
    {l:'A. 沉默，低头看地板。',a:"d3c_gr('av')"},{l:'B. 我不知道回什么。',a:"d3c_gr('ho')"},{l:'C. 欧巴，其实我也每天健身的。明天会见到你吗？',a:"d3c_gr('op')"}]);}
function d3c_gr(t){
  if(t==='op'){cA('hj',10);R_('💪','欧巴，其实我也每天健身的。李贤在的瞳孔缩了一下。<br><br>明天会见到你吗？你问——然后转身，没等他回答。<br><br>李贤在站在原地。汗水滴进眼睛里，他抬手擦了一把，嘴角却往上扯。<em>她在约我。</em>用最轻的话下最重的钩。',d3c_er);}
  else if(t==='ho'){cA('hj',5);R_('💬','我不知道回什么。<br><br>他愣了一下。然后笑——不是挑衅的笑，是某种被诚实打动的笑。<br><br>那就别回。他说，明天七点。你来，或者不来。我都在这。',d3c_er);}
  else{R_('🚪','你沉默，低头看地板。他等了你很久——然后退后一步。<br><br>那就当我没问。他转身回去举铁。杠铃砸在地上的声音比之前重。',d3c_er);}
}
function d3c_er(){
  C_("✦ 走廊 · Eric ✦","健身房外传来脚步声。Eric的声音由远及近：'李贞？你在——'他停在走廊拐角，看见你和李贤在的距离，声音卡住了。<br><br>……啊。你们在忙啊。<br><br>他没走。靠在墙上，手指绞着衣角，像只被主人遗忘在门外的狗。<br><br>你转身——看见他眼眶又红了，但这次不是因为洋葱。",null,[
    {l:'A. 从他身边走过，回房间。',a:"R_('🚶','你从他身边走过。他的手指从衣角上松开。<br><br>走廊里只剩下Eric一个人。他站了很久，然后对着墙说了一句——没事。她只是没看到我。<br><br>然后他去厨房，又开始练颠球。',d3c_rk)"},{l:'B. 伸手拍拍他肩膀。',a:"d3c_eb()"},{l:'C. 你比赛的时候……我想去加油。',a:"d3c_ec()"}]);}
function d3c_eb(){cA('er',3);R_('🐱','你伸手，轻轻拍了拍他肩膀。然后收回。<br><br>Eric愣了一秒，然后笑了，眼睛弯成月牙。……我会加油的！为了你！他转身跑走，背影雀跃得像只终于得到抚摸的金毛。',d3c_rk);}
function d3c_ec(){cA('er',8);R_('⚽','你比赛的时候……我想去加油。<br><br>Eric的眼睛从阴转晴只用了一秒——像只被主人摸头的金毛，尾巴摇得快要起飞：真的？！我下周有场友谊赛！给你留最好的位置！<br><br>他冲过来——想抱你，又刹住。手悬在半空：……可以抱一下吗？<br><br>你伸手，轻轻拍了他肩膀一下。他笑了，像得到了全世界。',d3c_rk);}
function d3c_rk(){
  C_("✦ 心动排名 ✦","节目组通知：第二轮心动排名。你捏着笔，盯着卡片。<br><br>你没注意到——裴俊英站在二楼楼梯口，手里端着一杯凉掉的咖啡。他看见了全部。你叫李贤在'欧巴'。你约他明天见。你拍Eric的肩膀。<br><br>他转身回房间。咖啡倒进洗手池，黑色的液体打着旋消失。",d3c_j);}
function d3c_j(){
  C_("✦ 职业公布 ✦","晚上，所有人聚集在客厅。节目组依次公布职业：<br><br>女A：律师 · 女B：新锐编剧 · 女C：外科医生<br><em>你：啦啦队队员</em><br><br>Eric第一个跳起来：'啦啦队？！下次比赛你来场边——'<br><br>李贤在：退役特种兵 · 金泳勋：高级翻译官<br>裴俊英：三星职员 · Eric：足球球星<br><br>'足球球星和啦啦队队员，'女A晃着红酒杯，'很配啊。'她故意看向裴俊英。<br><br>裴俊英没表情。他看着你，眼神里有十个月的回忆在翻涌——他曾经请假去看你比赛，坐在最后一排，你没看见他。",function(){NT(d3c_sms);});}

function d4a(){C_("✦ 晨间镜头 ✦","早上七点，客厅。气氛变了。<br><br>李贤在从厨房出来，手里端着两杯咖啡。他径直走向你，把其中一杯递过来。'浅烘的。今天不想喝苦的？'裴俊英在阳台门口，看着这一幕，没动。",d4a_rank);}
function d4a_rank(){C_("✦ 心动排名 ✦","节目组宣布：写下对四位异性的心动顺序。<br><br>李贤在看向你：'你觉得自己会排第几？'<br>'我猜你会排第一。'姜宥真说，'在某些人心里。'她目光扫过裴俊英，又扫过李贤在，最后落在李柱延身上。",d4a_hj);}
function d4a_hj(){C_("✦ 楼梯口 · 李贤在 ✦","你上楼放卡片。李贤在靠在扶手上。<br><br>'你写了谁第一？''不告诉你。'<br>'我猜是裴俊英。或者……你在等某个人改变顺序？'<br><br>他从你身边走过。但你在楼梯扶手上看到一张卡片：<em>'今晚夜宵，厨房，两点。'</em><br><br>没有署名。",d4a_jb);}
function d4a_jb(){C_("✦ 花园 · 裴俊英 ✦","下午，你在花园里抽烟。裴俊英从侧门出来。<br><br>'昨天，你报的是呼号。KE704的呼号。不是航班号。'<br>'你查了很多。'<br>'嗯。我想知道，是什么样的过去，值得放在木盒里让人选。'<br><br>'裴俊英。''嗯？'<br>'你不用查那么多。有时候，知道得少，反而轻松。'<br><br>他看着你，很久。然后笑了一下，那笑里有东西碎了。<br><br>'但我不想要轻松。'他说。",d4a_rr);}
function d4a_rr(){C_("✦ Panel Room ✦","MC1：'女嘉宾方面，玩家和姜宥真并列第一。但玩家的票数更集中。'<br><br>MC2：'男嘉宾方面，李贤在和裴俊英并列。李贤在的票来自第一选择，裴俊英的票来自第二选择。'<br><br>MC2：'不一定。有时候第二选择，才是最后的选择。'",d4a_ex);}
function d4a_ex(){C_("✦ EX 事件 ✦","凌晨两点十二分。你从厨房出来——李贤在的啤酒还留在舌尖上，微苦。<br><br>走廊尽头，李柱延的房间门开着一道缝。灯光从里面漏出来，像飞机着陆灯。你没停。经过时余光看见他坐在床边，手里拿着一个东西——不是你落下的外套，不是靠垫。是你放在木盒里的那张机票存根。<br><br>他没抬头。但他知道你在门口——你站了两秒，推门进去了。<br><br>'你拿回来了。'你说。<br><br>'裴俊英还给我的。'他把存根放在床头，'他说——这个不应该在他手里。'<br><br>你们沉默了多久，你不知道。<br><br>'KE704。'你念出那个航班号。'我放在木盒里。你没选。'<br><br>'我选不了。'他声音哑下去，'我怕选了——就真的承认你还在我心里了。'<br><br>走廊灯灭了。只有他房间的灯光照在你脸上。他抬起头看你，目光像雷达屏幕上的红色回波——清晰，单一，没有杂讯。<br><br>'那你现在，承认了吗。'<br><br>他没有回答。但他把机票存根放进了自己的抽屉。不是你的，是他的。",d4a_hid);}
function d4a_hid(){C_("✦ 隐藏镜头 ✦","姜宥真在房间里打开李贤在给她的卡片——'口红颜色很适合你。'她把卡片贴在胸口，然后撕掉，扔进垃圾桶。<br><br>徐敏荷凌晨起来喝水，在走廊上看到你的房间门缝里透出灯光。她站了一会儿。水杯里的冰化了，她没喝。<br><br>李贤在站在厨房，看着那张'今晚夜宵'的卡片。凌晨两点零三分你推门进来的瞬间，他笑了。现在他站在同样的位置，把卡片折起来，放进口袋。他在想，你是从谁的房间回来的。<br><br>裴俊英在阳台上。看到你的灯亮着，又灭了。他拿出手机，打了几个字又删掉。最后他关掉手机，对着仁川机场的方向站了很久。",function(){NT(d4a_sms);});}
function d4a_sms(){sV("匿名短信","DAY 4 · 深夜");sb("你居然去查了。","him");sb("今晚厨房，两点。你来了，我就知道了。","him");ss("— 你收到了 2 条 —");G.exTo[4]="徐敏荷";sr_("✦ 前任报告 ✦<br>你的前任（李柱延）今晚将短信发给了<br><b>徐敏荷</b>");sn_("连续四天。从来没有你。如果他再不主动，我就放下了。");sa([{l:"A. 发给李柱延——关于靠垫，他到底在怕什么",a:function(){d4a_s("jy","靠垫我收到了。你到底在怕什么？")}},{l:"B. 发给裴俊英——回应 你居然去查了",a:function(){d4a_s("jb","你居然去查了。")}},{l:"C. 发给李贤在——去厨房，两点",a:function(){d4a_s("hj","两点见。")}}]);}

function d5a(){C_("✦ 晨间镜头 ✦","早上七点。你下楼时发现客厅里只有一个人。李柱延坐在餐桌边，面前放着一杯冷掉的黑咖啡。他大概坐了有一会儿了。<br><br>你走向厨房。他开口，声音很轻：'昨晚——啤酒好喝吗。'<br><br>不是问句。和以前一样。是陈述句。<br><br>你倒了杯水，背对着他：'甜的。'<br><br>'深烘变成甜的。你的口味变了不少。'<br><br>你转身。他没看你，在看手里的什么东西——一个旧信封，折了角。KE704的航班号露出来。<br><br>'口味没变。'你说，'只是以前你没问过我。'<br><br>李贤在从二楼下来，头发还湿着。他看看你，又看看李柱延手里的信封，脚步慢了一拍。然后径直走到你身边，从你手里拿走水杯，换成他手里的燕麦奶。<br><br>'暖的。'他说，没看李柱延。'你今天喝这个。'<br><br>客厅里三个人的呼吸声。然后李柱延站起来，把信封放进口袋，出去了。",d5a_task);}
function d5a_task(){C_("✦ 任务 · 前任问题 ✦","节目组宣布：抽取卡片回答关于前任的问题。<br><br>李贤在看向你：'你怕吗？''不怕。''为什么？'<br>'因为，'你顿了顿，'我的前任，已经做了选择。'<br><br>李柱延正在倒水，手指顿了一下。水溢出来，他没发现。",d5a_jy);}
function d5a_jy(){C_("✦ 走廊 · 李柱延 ✦","你在走廊尽头抽烟。李柱延从房间出来，停下脚步。<br><br>'今天的问题，你会怎么答？''如实答。'<br>'如果问到为什么分手呢？'<br><br>'我会说，因为我觉得他不懂表达对我的爱。因为他周围太多人，他没有直白划开界限。因为——我累了，先走了。'<br><br>'那如果问到，还有没有感情呢？'<br><br>'有。但不够了。'<br><br>他手指攥紧，又松开。走廊的感应灯灭了。灯再亮时，他已经走了。<br><br>但你在窗台上看到——他放了一包纸巾。他记得。",d5a_ans);}
function d5a_ans(){C_("✦ 前任问题 · 回答 ✦","<em>李柱延抽到：和前任分手，是谁的错？</em><br><br>'我的错。她需要我表达的时候，我觉得行动就够了。她需要我划界限的时候，我觉得信任就够了。她走了，我才明白——行动和信任，如果不被看见，就等于没有。'<br><br><em>你抽到：对前任还有感情吗？</em><br><br>'有。但感情不是开关。它是油门，可以踩得很轻，也可以慢慢松开。我现在——脚还在踏板上，但已经准备松开了。'<br><br><em>李贤在抽到：会为了前任放弃新对象吗？</em><br><br>'不会。但我会在新对象和前任之间，选那个先走向我的人。'他说完，看向你。你迎着他的目光，没躲。",d5a_hid);}
function d5a_hid(){C_("✦ 隐藏镜头 ✦","姜宥真走过来：'只是觉得他看你的眼神，不像看陌生人。像看一个——他以为会一直在，结果走了的人。'<br><br>李柱延在房间里，把KE704机票存根从钱包里拿出来。他把它贴在胸口，放进抽屉最深处。<br><br>李贤在站在厨房，把那张'今晚夜宵'的卡片折起来，放进口袋。",function(){NT(d5a_sms);});}

function d4c_rank(){C_("✦ 心动排名 ✦","第二轮心动排名。你捏着笔，盯着卡片。<br><br>转身时撞见裴俊英——他站在楼梯口，手里也拿着信封。'你写了吗？''嗯。'<br><br>他从你身边走过。信封擦过你的手臂——很轻，像从前半夜给你盖毯子时那样轻。",d4c_xr);}

function d5c(){C_("✦ 晨间镜头 ✦","第五天。猜前任环节。<br><br>你六点五十到健身房，李贤在已经在举铁。他看见你，杠铃差点脱手。<br><br>'……不是七点？''我准时。你六点到的。'<br><br>他耳尖红了，把燕麦奶递给你。你们坐在地板上喝着燕麦奶。他忽然说：'李贞，我今天猜前任，会猜裴俊英。你们的眼神——像烧过又灭掉的火。但我还是会选你。不管你是不是他的前任。'",d5c_guess);}
function d5c_guess(){C_("✦ 任务 · 猜前任 ✦","晚上，节目组公布每位嘉宾的猜测。女A猜你的前任是Eric，女B猜李贤在，女C猜金泳勋。<br><br>李贤在在卡片上写了裴俊英。只写了一行字：'他给她煎蛋的样子，像做过一千次。'<br><br>Eric也写了裴俊英。他画了一只狗和一个煎蛋。<br><br>金泳勋写的是李贤在。'健身房的气氛。只有前任才能制造那种沉默。'<br><br>全部公开之后，李贤在看了你一眼。那一秒里有很多东西——他猜对了，但这不是他想猜对的答案。",d5c_reveal);}
function d5c_reveal(){C_("✦ 前任公布 ✦","主持人打开最后一个信封。屏幕上打出四对名字：<br><br>李贞 & 裴俊英(Jacob)<br>李贤在 & 女A(律师)<br>金泳勋 & 女B(编剧)<br>Eric & 女C(外科医生)<br><br>全场安静了大概五秒。<br><br>李贤在看着女A。女A也在看他——这两人之间的空气突然有了形状。律师和特种兵。打过十七小时庭审的人，和杀过人的人。<br><br>Eric挠了挠头，看向女C。女C面无表情地翻了一页杂志。但他耳朵红了。<br><br>裴俊英站起来。他没有看女B。他走向你——在所有人的目光下，他停在你面前。<br><br>'李贞。'他叫你的全名，声音很轻，像怕你回避，'来这个节目之后，我一直在想一件事。'<br><br>你抬头看他。<br><br>'我猜错了很多人。但我从头到尾——只选了你。'<br><br>他说完，没有等你回答。他转身走出客厅，手里还攥着那张X Room里拿回来的围巾。<br><br>女B坐在沙发上，低头看着自己的手指。她早就猜到了。她只是刚才没说。",function(){NT(d5c_sms);});}
